[package]
name = "dropbeam-transfer-core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]
name = "dropbeam_transfer_core"

[features]
default = ["wasm"]
wasm = ["wasm-bindgen", "getrandom/js", "console_error_panic_hook"]
native = []

[dependencies]
wasm-bindgen = { version = "0.2", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

# crypto
sha2 = "0.10"
aes-gcm = "0.10"
pbkdf2 = { version = "0.12", features = ["simple"] }
hmac = "0.12"
hex = "0.4"
rand = { version = "0.8", default-features = false, features = ["std_rng"] }
getrandom = { version = "0.2", features = ["js"] }
zeroize = "1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
